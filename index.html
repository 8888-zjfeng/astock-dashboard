<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股实战分析系统 V3.7</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-hover: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --red: #f85149;
            --green: #3fb950;
            --yellow: #d29922;
            --blue: #58a6ff;
            --purple: #a371f7;
            --orange: #f0883e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 顶部导航 */
        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: var(--blue);
        }

        .market-overview {
            display: flex;
            gap: 20px;
        }

        .index-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .index-name {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .index-value {
            font-weight: 600;
            font-size: 14px;
        }

        .index-change {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .index-change.up {
            background: rgba(248, 81, 73, 0.15);
            color: var(--red);
        }

        .index-change.down {
            background: rgba(63, 185, 80, 0.15);
            color: var(--green);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .time-display {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .refresh-btn {
            background: var(--blue);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover {
            opacity: 0.85;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 主布局 */
        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 16px;
            padding: 16px;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* 卡片样式 */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .card-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-body {
            padding: 12px;
        }

        /* 左侧面板 */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 板块资金流 */
        .sector-flow {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sector-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--bg-hover);
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .sector-item:hover {
            transform: translateX(4px);
        }

        .sector-name {
            font-size: 13px;
            font-weight: 500;
        }

        .sector-flow-amount {
            font-size: 12px;
            font-weight: 600;
        }

        .sector-flow-amount.positive {
            color: var(--red);
        }

        .sector-flow-amount.negative {
            color: var(--green);
        }

        /* 中间面板 */
        .center-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 分时图区域 */
        .chart-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .chart-container {
            height: 300px;
            position: relative;
        }

        /* K线图样式 */
        .candlestick-container {
            height: 300px;
        }

        /* 强势股列表 */
        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 400px;
            overflow-y: auto;
        }

        .stock-item {
            display: grid;
            grid-template-columns: 1fr 80px 60px;
            gap: 12px;
            padding: 10px 12px;
            background: var(--bg-hover);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .stock-item:hover {
            background: var(--border);
        }

        .stock-name {
            font-size: 13px;
        }

        .stock-code {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .stock-price {
            font-size: 13px;
            font-weight: 600;
            text-align: right;
        }

        .stock-change {
            font-size: 12px;
            text-align: right;
            font-weight: 500;
        }

        .stock-change.up {
            color: var(--red);
        }

        .stock-change.down {
            color: var(--green);
        }

        /* 右侧面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 涨停板 */
        .limit-up-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 300px;
            overflow-y: auto;
        }

        .limit-up-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(248, 81, 73, 0.1);
            border-left: 3px solid var(--red);
            border-radius: 4px;
        }

        .limit-up-name {
            font-size: 13px;
            font-weight: 500;
        }

        .limit-up-reason {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .limit-up-time {
            font-size: 11px;
            color: var(--yellow);
        }

        /* 量能分析 */
        .volume-analysis {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .volume-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .volume-label {
            width: 100px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .volume-track {
            flex: 1;
            height: 20px;
            background: var(--bg-hover);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .volume-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .volume-fill.red {
            background: linear-gradient(90deg, var(--red), #ff6b6b);
        }

        .volume-fill.green {
            background: linear-gradient(90deg, var(--green), #69db7c);
        }

        .volume-fill.blue {
            background: linear-gradient(90deg, var(--blue), #74c0fc);
        }

        .volume-fill.yellow {
            background: linear-gradient(90deg, var(--yellow), #ffd43b);
        }

        .volume-percent {
            width: 50px;
            font-size: 12px;
            font-weight: 600;
            text-align: right;
        }

        /* 历史复盘控制 */
        .replay-controls {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            position: sticky;
            bottom: 0;
        }

        .date-picker {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .date-picker label {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .date-input {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
        }

        .date-input:focus {
            outline: none;
            border-color: var(--blue);
        }

        .mode-toggle {
            display: flex;
            background: var(--bg-hover);
            border-radius: 6px;
            overflow: hidden;
        }

        .mode-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--blue);
            color: #fff;
        }

        .replay-nav {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-primary);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--border);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 状态标签 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-badge.realtime {
            background: rgba(63, 185, 80, 0.15);
            color: var(--green);
        }

        .status-badge.replay {
            background: rgba(210, 153, 34, 0.15);
            color: var(--yellow);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-badge.realtime .status-dot {
            background: var(--green);
        }

        .status-badge.replay .status-dot {
            background: var(--yellow);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 信号指示器 */
        .signal-indicator {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .signal-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: var(--bg-hover);
            border-radius: 6px;
        }

        .signal-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .signal-value {
            font-size: 14px;
            font-weight: 600;
        }

        .signal-value.positive {
            color: var(--red);
        }

        .signal-value.negative {
            color: var(--green);
        }

        .signal-value.neutral {
            color: var(--yellow);
        }

        /* 资金流进度条 */
        .flow-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-hover);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 8px;
        }

        .flow-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .flow-fill.positive {
            background: var(--red);
        }

        .flow-fill.negative {
            background: var(--green);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* 标签切换 */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 12px;
        }

        .tab {
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .tab:hover:not(.active) {
            color: var(--text-primary);
        }

        /* 统计数字 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
        }

        .stat-item {
            text-align: center;
            padding: 12px 8px;
            background: var(--bg-hover);
            border-radius: 6px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-value.up {
            color: var(--red);
        }

        .stat-value.down {
            color: var(--green);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* 快捷键提示 */
        .shortcut-hint {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 12px;
            color: var(--text-secondary);
            display: none;
        }

        .shortcut-hint kbd {
            background: var(--bg-hover);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            margin: 0 4px;
        }

        /* 响应式 */
        @media (max-width: 1400px) {
            .main-container {
                grid-template-columns: 260px 1fr 280px;
            }
        }

        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            
            .left-panel, .right-panel {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 工具提示 */
        .tooltip {
            position: relative;
        }

        .tooltip::after {
            content: attr(data-tip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 10px;
            background: var(--text-primary);
            color: var(--bg-dark);
            font-size: 11px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .tooltip:hover::after {
            opacity: 1;
        }
    </style>

<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-left">
            <div class="logo">📊 A股实战分析 V3.7</div>
            <div class="market-overview">
                <div class="index-item">

    <script>
        // ==================== 全局状态 ====================

        // ==================== 图表初始化 ====================

            // 成交量图表
            const volumeCtx = document.getElementById('volumeChart').getContext('2d');
            state.charts.volume = new Chart(volumeCtx, {
                type: 'bar',

                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#8b949e', maxTicksLimit: 8 }
                        },
                        y: {
                            position: 'right',
                            grid: { color: 'rgba(48, 54, 61, 0.5)' },
                            ticks: { color: '#8b949e' }
                        }

            });

            // 资金流向图表
            const fundCtx = document.getElementById('fundFlowChart').getContext('2d');
            state.charts.fundFlow = new Chart(fundCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: '主力净流入',
                        data: [],
                        backgroundColor: [],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {

                            ticks: { color: '#8b949e', maxTicksLimit: 6 }
                        },
                        y: {

        // ==================== 数据刷新 ====================
        async function refreshData() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;margin:0;"></span> 刷新中...';

            try {
                if (state.mode === 'realtime') {
                    await Promise.all([
                        fetchMarketOverview(),
                        fetchMarketStats(),
                        fetchSectorFlow(),
                        fetchStrongStocks(),
                        fetchLimitUp(),
                        fetchAlertStocks(),
                        fetchPriceData(),
                        fetchVolumeAnalysis(),
                        fetchFundFlow()
                    ]);
                } else {
                    await loadReplayData();
                }
            } catch (error) {
                console.error('数据刷新失败:', error);
            }

            btn.disabled = false;
            btn.innerHTML = '<span>🔄</span> 刷新数据';
        }

        // ==================== 数据获取函数 ====================
        
        // 获取市场概览（指数数据）
        async function fetchMarketOverview() {
            try {
                if (DEMO_MODE) {
                    const data = MockData.marketOverview();
                    data.forEach(d => {
                        document.getElementById(`${d.name}-value`).textContent = d.value;
                        const el = document.getElementById(`${d.name}-change`);
                        el.textContent = d.change;
                        el.className = `index-change ${d.cls}`;
                    });
                    return;
                }

                // 使用东方财富API获取指数数据
                const indices = [
                    { code: 'sh000001', name: 'sh-index', change: 'sh-index-change' },
                    { code: 'sz399001', name: 'sz-index', change: 'sz-index-change' },
                    { code: 'sz399006', name: 'cy-index', change: 'cy-index-change' }
                ];

                for (const idx of indices) {
                    const response = await fetch(
                        `https://hq.sinajs.cn/list=${idx.code}`,
                        { headers: { 'Referer': 'https://finance.sina.com.cn' } }
                    );
                    const text = await response.text();
                    const match = text.match(/="([^"]+)"/);
                    
                    if (match) {
                        const data = match[1].split(',');
                        const value = parseFloat(data[1]).toFixed(2);
                        const change = parseFloat(data[2]).toFixed(2);
                        const changePercent = ((change / (value - change)) * 100).toFixed(2);
                        
                        document.getElementById(`${idx.name}-value`).textContent = value;
                        const changeEl = document.getElementById(idx.change);
                        changeEl.textContent = `${change > 0 ? '+' : ''}${change} (${changePercent}%)`;
                        changeEl.className = `index-change ${change >= 0 ? 'up' : 'down'}`;
                    }
                }
            } catch (error) {
                console.error('获取市场概览失败:', error);
                // Demo模式备用
                const data = MockData.marketOverview();
                data.forEach(d => {
                    document.getElementById(`${d.name}-value`).textContent = d.value;
                    const el = document.getElementById(`${d.name}-change`);
                    el.textContent = d.change;
                    el.className = `index-change ${d.cls}`;
                });
            }
        }

        // 获取市场统计（涨跌停数量）
        async function fetchMarketStats() {
            try {
                // 东方财富 - 获取沪深全市场涨跌家数
                const ts = Date.now();
                const res = await fetch(`${EMC_HOST}/api/qt/clist/get?pn=1&pz=10000&po=1&np=1&ut=bd1d9428fe826ef2efbe&fltt=2&invt=2&fid=f3&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=f3,f20&cb=&_=${ts}`);
                const json = await res.json();
                
                if (json.rc === 0 && json.data && json.data.diff) {
                    const stocks = json.data.diff;
                    const upCount = stocks.filter(s => s.f3 > 0).length;
                    const downCount = stocks.filter(s => s.f3 < 0).length;
                    const limitUpCount = stocks.filter(s => s.f3 >= 9.9).length;
                    const limitDownCount = stocks.filter(s => s.f3 <= -9.9).length;
                    const flatCount = stocks.filter(s => s.f3 === 0).length;
                    
                    document.getElementById('up-count').textContent = upCount;
                    document.getElementById('down-count').textContent = downCount;
                    document.getElementById('limit-up-count').textContent = limitUpCount;
                    document.getElementById('limit-down-count').textContent = limitDownCount;
                    document.getElementById('zt-count').textContent = limitUpCount + '只';
                    
                    // 市场强度信号
                    const strength = Math.round(upCount / (upCount + downCount) * 100);
                    const bullSignals = Math.min(Math.round(strength / 14), 7);
                    const bearSignals = 7 - bullSignals;
                    document.getElementById('bull-signal').textContent = bullSignals;
                    document.getElementById('bear-signal').textContent = bearSignals;
                    document.getElementById('market-strength').textContent = strength + '%';
                }
            } catch (error) {
                console.error('获取涨跌统计失败:', error);
                // 备用数据
                document.getElementById('up-count').textContent = '--';
                document.getElementById('down-count').textContent = '--';
                document.getElementById('zt-count').textContent = '--';
            }
        }

        // 获取板块资金流
        async function fetchSectorFlow() {
            try {
                // 东方财富 - 行业板块资金流向，按主力净流入降序
                const ts = Date.now();
                const res = await fetch(`${EMC_HOST}/api/qt/clist/get?pn=1&pz=20&po=1&np=1&ut=bd1d9428fe826ef2efbe&fltt=2&invt=2&fid=f62&fs=m:90+t:2&fields=f12,f14,f62,f184,f2,f3&cb=&_=${ts}`);
                const json = await res.json();
                
                if (json.rc === 0 && json.data && json.data.diff) {
                    // 按主力净流入排序，取流入最多8个和流出最多4个
                    const all = json.data.diff;
                    const sorted = [...all].sort((a, b) => b.f62 - a.f62);
                    const inflow = sorted.slice(0, 8);
                    const outflow = sorted.slice(-4).reverse();
                    const sectors = [...inflow, ...outflow];
                    
                    const maxAbs = Math.max(...sectors.map(s => Math.abs(s.f62)));
                    
                    const container = document.getElementById('sector-flow');
                    container.innerHTML = sectors.map(sector => {
                        const flow = (sector.f62 / 1e8).toFixed(1);
                        const positive = sector.f62 >= 0;
                        const barWidth = Math.min(Math.abs(sector.f62) / maxAbs * 100, 100);
                        return `
                        <div class="sector-item" onclick="selectSector('${sector.f14}')">
                            <div>
                                <div class="sector-name">${sector.f14} <span style="color:var(--text-secondary);font-size:11px">${positive ? '+' : ''}${sector.f3}%</span></div>
                                <div class="flow-bar">
                                    <div class="flow-fill ${positive ? 'positive' : 'negative'}" 
                                         style="width: ${barWidth}%"></div>
                                </div>
                            </div>
                            <div class="sector-flow-amount ${positive ? 'positive' : 'negative'}">
                                ${positive ? '+' : ''}${flow}亿
                            </div>
                        </div>`;
                    }).join('');
                }
            } catch (error) {
                console.error('获取板块资金流失败:', error);
                document.getElementById('sector-flow').innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center">数据加载失败，请刷新重试</div>';
            }
        }

        // 获取强势股
        async function fetchStrongStocks(type = 'fund') {
            try {
                // 东方财富 - 沪深A股涨幅榜TOP10
                const ts = Date.now();
                const fid = type === 'fund' ? 'f62' : 'f5';  // f62主力净流入, f5成交量
                const res = await fetch(`${EMC_HOST}/api/qt/clist/get?pn=1&pz=10&po=1&np=1&ut=bd1d9428fe826ef2efbe&fltt=2&invt=2&fid=f3&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=f2,f3,f4,f5,f6,f7,f8,f9,f10,f12,f13,f14&cb=&_=${ts}`);
                const json = await res.json();
                
                if (json.rc === 0 && json.data && json.data.diff) {
                    const stocks = json.data.diff;
                    const container = document.getElementById('strong-stocks');
                    container.innerHTML = stocks.map(stock => {
                        const price = (stock.f2 / 100).toFixed(2);
                        const chg = stock.f3.toFixed(2);
                        const mktId = stock.f13 === 1 ? '60' : (stock.f13 === 0 ? '00' : '68');
                        const marketName = stock.f13 === 1 ? '沪' : (stock.f13 === 0 ? '深' : '科');
                        const isUp = stock.f3 >= 0;
                        const turnover = stock.f8 ? stock.f8.toFixed(1) + '%' : '--';
                        return `
                        <div class="stock-item" onclick="selectStock('${stock.f12}', ${stock.f13})">
                            <div>
                                <div class="stock-name">${stock.f14} <span class="stock-code" style="font-size:10px;color:var(--text-secondary)">[${marketName}]${stock.f12}</span></div>
                                <div class="stock-code" style="font-size:11px">换手率 ${turnover}</div>
                            </div>
                            <div class="stock-price">${price}</div>
                            <div class="stock-change ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${chg}%</div>
                        </div>`;
                    }).join('');
                }
            } catch (error) {
                console.error('获取强势股失败:', error);
                document.getElementById('strong-stocks').innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center">数据加载失败</div>';
            }
        }

        // 获取涨停板
        async function fetchLimitUp() {
            try {
                // 东方财富 - 涨停板（涨幅>=9.9%）
                const ts = Date.now();
                const res = await fetch(`${EMC_HOST}/api/qt/clist/get?pn=1&pz=20&po=1&np=1&ut=bd1d9428fe826ef2efbe&fltt=2&invt=2&fid=f3&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=f2,f3,f4,f5,f6,f7,f8,f9,f10,f12,f13,f14&cb=&_=${ts}`);
                const json = await res.json();
                
                if (json.rc === 0 && json.data && json.data.diff) {
                    const limitUps = json.data.diff.filter(s => s.f3 >= 9.9);
                    
                    const container = document.getElementById('limit-up-list');
                    if (limitUps.length === 0) {
                        container.innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center">暂无涨停股票</div>';
                        return;
                    }
                    container.innerHTML = limitUps.map(stock => {
                        const price = (stock.f2 / 100).toFixed(2);
                        const chg = stock.f3.toFixed(2);
                        const is20 = stock.f3 >= 19.9;
                        const marketName = stock.f13 === 1 ? '沪' : (stock.f13 === 0 ? '深' : '科');
                        const turnover = stock.f8 ? stock.f8.toFixed(1) + '%' : '--';
                        return `
                        <div class="limit-up-item" onclick="selectStock('${stock.f12}', ${stock.f13})">
                            <div>
                                <div class="limit-up-name">${stock.f14} <span style="color:${is20 ? 'var(--purple)' : 'var(--red)'};font-size:11px">${is20 ? '⚡20cm' : '涨停'}</span></div>
                                <div class="limit-up-reason">换手率 ${turnover} | [${marketName}]${stock.f12}</div>
                            </div>
                            <div class="limit-up-time" style="color:${is20 ? 'var(--purple)' : 'var(--red)'}">+${chg}%</div>
                        </div>`;
                    }).join('');
                }
            } catch (error) {
                console.error('获取涨停板失败:', error);
                document.getElementById('limit-up-list').innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center">数据加载失败</div>';
            }
        }

        // 获取异动监控
        async function fetchAlertStocks() {
            try {
                // 东方财富 - 量比异动股（量比>3，成交活跃的强势股）
                const ts = Date.now();
                const res = await fetch(`${EMC_HOST}/api/qt/clist/get?pn=1&pz=8&po=1&np=1&ut=bd1d9428fe826ef2efbe&fltt=2&invt=2&fid=f10&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=f2,f3,f4,f5,f6,f7,f8,f9,f10,f12,f13,f14&cb=&_=${ts}`);
                const json = await res.json();
                
                if (json.rc === 0 && json.data && json.data.diff) {
                    // 量比>2的股票为异动候选
                    const alerts = json.data.diff.filter(s => s.f10 && s.f10 > 2).slice(0, 8);
                    
                    const container = document.getElementById('alert-stocks');
                    if (alerts.length === 0) {
                        container.innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center">暂无异动股票</div>';
                        return;
                    }
                    container.innerHTML = alerts.map(stock => {
                        const price = (stock.f2 / 100).toFixed(2);
                        const chg = stock.f3.toFixed(2);
                        const vr = stock.f10 ? stock.f10.toFixed(1) : '--';
                        const isUp = stock.f3 >= 0;
                        const alertLevel = stock.f10 > 5 ? 'high' : 'medium';
                        const alertTag = stock.f10 > 5 ? '⚡ 量比' + vr : '📈 量比' + vr;
                        return `
                        <div class="stock-item" onclick="selectStock('${stock.f12}', ${stock.f13})">
                            <div>
                                <div class="stock-name" style="color: ${alertLevel === 'high' ? 'var(--red)' : 'var(--yellow)'}">
                                    ${alertTag} ${stock.f14}
                                </div>
                                <div class="stock-code">${stock.f12} | 换手率 ${stock.f8 ? stock.f8.toFixed(1) : '--'}%</div>
                            </div>
                            <div style="text-align:right">
                                <div class="stock-price">${price}</div>
                                <div class="stock-change ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${chg}%</div>
                            </div>
                        </div>`;
                    }).join('');
                }
            } catch (error) {
                console.error('获取异动股票失败:', error);
                document.getElementById('alert-stocks').innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center">数据加载失败</div>';
            }
        }

        // 获取价格数据
        async function fetchPriceData() {
            try {
                // 东方财富 - 个股分时数据（默认上证指数）
                const codeEl = document.getElementById('stock-code');
                const rawCode = codeEl ? codeEl.value.trim() : '';
                const code = rawCode || '000001';
                // 判断市场：60开头=沪, 00/30开头=深, 68开头=科创
                const market = code.startsWith('6') ? '1' : '0';
                const ts = Date.now();
                
                const res = await fetch(`${EMH_HOST}/api/qt/stock/trends2/get?secid=${market}.${code}&fields1=f1,f2,f3,f4,f5,f6,f7,f8,f9,f10,f11,f12,f13&fields2=f51,f52,f53,f54,f55,f56,f57,f58&cb=&_=${ts}`);
                const json = await res.json();
                
                if (json.rc === 0 && json.data && json.data.trends) {
                    const name = json.data.name || code;
                    const titleEl = document.getElementById('chart-title');
                    if (titleEl) titleEl.textContent = `📊 ${name} 分时走势`;
                    
                    const trends = json.data.trends
                        .filter(t => t && t.split(',')[2] && t.split(',')[2] !== '-')
                        .map(t => {
                            const parts = t.split(',');
                            return {
                                time: parts[0] ? parts[0].split(' ')[1] : '',  // 只要时间部分
                                price: parseFloat(parts[2]),
                                avg: parseFloat(parts[7] || parts[2]),
                                volume: parseInt(parts[5] || 0)
                            };
                        }).filter(d => !isNaN(d.price) && d.price > 0);
                    
                    if (trends.length > 0) {
                        renderPriceChart(trends);
                        renderVolumeChart(trends);
                    }
                } else {
                    console.warn('无法获取分时数据，可能是非交易时间或代码错误');
                }
            } catch (error) {
                console.error('获取分时数据失败:', error);
            }
        }

        function renderPriceChart(data) {
            if (state.charts.price) {
                state.charts.price.data.labels = data.map(d => d.time);
                state.charts.price.data.datasets[0].data = data.map(d => d.price);
                state.charts.price.data.datasets[1].data = data.map(d => d.avg || d.price);
                state.charts.price.update('none');
            }
        }

        function renderVolumeChart(data) {
            if (state.charts.volume) {
                state.charts.volume.data.labels = data.map(d => d.time);
                state.charts.volume.data.datasets[0].data = data.map(d => d.volume);
                state.charts.volume.data.datasets[0].backgroundColor = data.map((d, i) => {
                    if (i === 0) return 'rgba(88, 166, 255, 0.7)';
                    return d.price >= data[i-1].price ? 'rgba(248, 81, 73, 0.7)' : 'rgba(63, 185, 80, 0.7)';
                });
                state.charts.volume.update('none');
            }
        }

        // 获取量能分析
        async function fetchVolumeAnalysis() {
            try {
                // 东方财富 - 沪深总成交额及涨跌分布
                const ts = Date.now();
                const res = await fetch(`${EMC_HOST}/api/qt/clist/get?pn=1&pz=5000&po=1&np=1&ut=bd1d9428fe826ef2efbe&fltt=2&invt=2&fid=f6&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23&fields=f2,f3,f5,f6,f7,f8&cb=&_=${ts}`);
                const json = await res.json();
                
                if (json.rc === 0 && json.data && json.data.diff) {
                    const stocks = json.data.diff;
                    const totalAmt = stocks.reduce((s, x) => s + (x.f6 || 0), 0);
                    const totalAmtStr = (totalAmt / 1e8).toFixed(0) + '亿';
                    
                    // 换手率分布
                    const trDist = [
                        { label: '高换手 >10%',  stocks: stocks.filter(s => s.f8 > 10),  color: 'var(--red)' },
                        { label: '活跃 5-10%',   stocks: stocks.filter(s => s.f8 > 5 && s.f8 <= 10),  color: 'var(--orange)' },
                        { label: '正常 2-5%',    stocks: stocks.filter(s => s.f8 > 2 && s.f8 <= 5),  color: 'var(--blue)' },
                        { label: '低迷 <2%',     stocks: stocks.filter(s => s.f8 > 0 && s.f8 <= 2),  color: 'var(--text-secondary)' },
                    ];
                    const maxCount = Math.max(...trDist.map(d => d.stocks.length));
                    
                    const volEl = document.getElementById('volume-total');
                    if (volEl) volEl.textContent = `总成交: ${totalAmtStr}`;
                    const avgEl = document.getElementById('volume-avg');
                    if (avgEl) avgEl.textContent = `${stocks.length}只`;
                    const chgEl = document.getElementById('volume-change');
                    if (chgEl) chgEl.textContent = `↑${stocks.filter(s=>s.f3>0).length}/↓${stocks.filter(s=>s.f3<0).length}`;
                    
                    const container = document.getElementById('volume-analysis');
                    container.innerHTML = trDist.map(item => `
                        <div class="volume-bar">
                            <div class="volume-label">${item.label}</div>
                            <div class="volume-track">
                                <div class="volume-fill" style="width: ${(item.stocks.length/maxCount*100).toFixed(0)}%; background: ${item.color}; height: 8px; border-radius: 4px;"></div>
                            </div>
                            <div class="volume-percent">${item.stocks.length}只</div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('获取量能分析失败:', error);
            }
        }

        // 获取资金流向
        async function fetchFundFlow() {
            try {
                // 东方财富 - 行业板块资金流，渲染为图表
                const ts = Date.now();
                const res = await fetch(`${EMC_HOST}/api/qt/clist/get?pn=1&pz=10&po=1&np=1&ut=bd1d9428fe826ef2efbe&fltt=2&invt=2&fid=f62&fs=m:90+t:2&fields=f12,f14,f62,f184,f2,f3&cb=&_=${ts}`);
                const json = await res.json();
                
                if (json.rc === 0 && json.data && json.data.diff) {
                    const sectors = json.data.diff.slice(0, 10);
                    const labels = sectors.map(s => s.f14.slice(0, 4));
                    const data = sectors.map(s => parseFloat((s.f62 / 1e8).toFixed(1)));
                    const colors = data.map(d => d >= 0 ? 'rgba(248, 81, 73, 0.75)' : 'rgba(63, 185, 80, 0.75)');
                    
                    if (state.charts.fundFlow) {
                        state.charts.fundFlow.data.labels = labels;
                        state.charts.fundFlow.data.datasets[0].data = data;
                        state.charts.fundFlow.data.datasets[0].backgroundColor = colors;
                        state.charts.fundFlow.update('none');
                    }
                    
                    // 更新资金数字（若有这些元素）
                    const totalIn = sectors.filter(s => s.f62 > 0).reduce((s, x) => s + x.f62, 0);
                    const totalOut = sectors.filter(s => s.f62 < 0).reduce((s, x) => s + x.f62, 0);
                    const mainEl = document.getElementById('main-fund');
                    const retailEl = document.getElementById('retail-fund');
                    if (mainEl) mainEl.textContent = '+' + (totalIn / 1e8).toFixed(1) + '亿';
                    if (retailEl) retailEl.textContent = (totalOut / 1e8).toFixed(1) + '亿';
                }
            } catch (error) {
                console.error('获取资金流向失败:', error);
            }
        }

        // ==================== 复盘功能 ====================
        
        function switchMode(mode) {
            state.mode = mode;
            
            document.getElementById('realtime-mode').classList.toggle('active', mode === 'realtime');
            document.getElementById('replay-mode').classList.toggle('active', mode === 'replay');
            document.getElementById('replay-nav').style.display = mode === 'replay' ? 'flex' : 'none';
            
            const statusBadge = document.getElementById('status-badge');
            const statusText = document.getElementById('status-text');
            
            if (mode === 'realtime') {
                statusBadge.className = 'status-badge realtime';
                statusText.textContent = '实时行情';
                state.autoRefresh = true;
                refreshData();
            } else {
                statusBadge.className = 'status-badge replay';
                statusText.textContent = '复盘模式';
                state.autoRefresh = false;
                
                // 设置日期选择器为今天
                const dateInput = document.getElementById('replay-date');
                dateInput.value = state.currentDate;
                dateInput.max = state.currentDate;
                loadReplayData();
            }
        }

        async function loadReplayData() {
            const date = document.getElementById('replay-date').value;
            if (!date) return;

            state.replayDate = date;
            
            const codeEl = document.getElementById('stock-code');
            const rawCode = codeEl ? codeEl.value.trim() : '';
            const code = rawCode || '000001';
            const market = code.startsWith('6') ? '1' : '0';
            
            try {
                const ts = Date.now();
                const res = await fetch(`${EMH_HOST}/api/qt/stock/trends2/get?secid=${market}.${code}&ndays=1&fields1=f1,f2,f3,f4,f5,f6,f7,f8,f9,f10,f11,f12,f13&fields2=f51,f52,f53,f54,f55,f56,f57,f58&cb=&end=${date.replace(/-/g,'')}150000&_=${ts}`);
                const json = await res.json();
                
                if (json.rc === 0 && json.data) {
                    const name = json.data.name || code;
                    const titleEl = document.getElementById('chart-title');
                    if (titleEl) titleEl.textContent = `📊 ${name} 复盘走势 (${date})`;
                    
                    if (json.data.trends && json.data.trends.length > 0) {
                        const trends = json.data.trends
                            .filter(t => t && t.split(',')[2] && t.split(',')[2] !== '-')
                            .map(t => {
                                const parts = t.split(',');
                                return {
                                    time: parts[0] ? parts[0].split(' ')[1] : '',
                                    price: parseFloat(parts[2]),
                                    avg: parseFloat(parts[7] || parts[2]),
                                    volume: parseInt(parts[5] || 0)
                                };
                            }).filter(d => !isNaN(d.price) && d.price > 0);
                        
                        if (trends.length > 0) {
                            renderPriceChart(trends);
                            renderVolumeChart(trends);
                        }
                    }
                    
                    // 同时刷新当天的涨停板和板块数据
                    await Promise.all([fetchSectorFlow(), fetchLimitUp(), fetchStrongStocks()]);
                }
            } catch (error) {
                console.error('加载复盘数据失败:', error);
                const titleEl = document.getElementById('chart-title');
                if (titleEl) titleEl.textContent = `📊 复盘走势 (${date}) - 加载失败，请重试`;
            }
        }

        function prevPeriod() {
            if (!state.replayDate) return;
            const date = new Date(state.replayDate);
            date.setDate(date.getDate() - 1);
            state.replayDate = date.toISOString().split('T')[0];
            document.getElementById('replay-date').value = state.replayDate;
            loadReplayData();
        }

        function nextPeriod() {
            if (!state.replayDate) return;
            const date = new Date(state.replayDate);
            const today = new Date();
            
            if (date < today) {
                date.setDate(date.getDate() + 1);
                state.replayDate = date.toISOString().split('T')[0];
                document.getElementById('replay-date').value = state.replayDate;
                loadReplayData();
            }
        }

        function exitReplay() {
            switchMode('realtime');
        }

        // ==================== 图表模式切换 ====================
        function switchChartMode(mode) {
            state.chartMode = mode;
            
            document.getElementById('minute-mode').classList.toggle('active', mode === 'minute');
            document.getElementById('daily-mode').classList.toggle('active', mode === 'daily');
            
            // 重新加载数据
            fetchPriceData();
        }

        // ==================== 辅助函数 ====================
        
        function selectStock(code) {
            state.selectedStock = code;
            console.log('选中股票:', code);
            // 这里可以扩展为显示选中股票的详细数据
        }

        function selectSector(name) {
            console.log('选中板块:', name);
        }

        function switchStockTab(tab) {
            const tabs = document.querySelectorAll('#strong-stocks').parent().querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // 切换数据
            if (tab === 'fund') {
                fetchStrongStocks('fund');
            } else {
                fetchStrongStocks('volume');
            }
        }

        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            document.getElementById('current-time').textContent = timeStr;
        }

        function startAutoRefresh() {
            if (state.refreshInterval) {
                clearInterval(state.refreshInterval);
            }
            
            state.refreshInterval = setInterval(() => {
                if (state.autoRefresh && state.mode === 'realtime') {
                    const now = new Date();
                    const hour = now.getHours();
                    const minute = now.getMinutes();
                    
                    // 交易时段自动刷新
                    if ((hour >= 9 && hour < 15) || (hour >= 10 && minute >= 30) || (hour >= 13 && hour < 15)) {
                        // 交易时段，每30秒刷新一次
                    }
                }
            }, 30000);
        }

        function showLoadingState() {
            const elements = ['sector-flow', 'strong-stocks', 'limit-up-list', 'alert-stocks', 'volume-analysis'];
            elements.forEach(id => {
                document.getElementById(id).innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        加载中...
                    </div>
                `;
            });
        }

        function handleKeyboard(e) {
            switch(e.key.toLowerCase()) {
                case 'r':
                    refreshData();
                    break;
                case ' ':
                    e.preventDefault();
                    state.autoRefresh = !state.autoRefresh;
                    break;
                case 'arrowleft':
                    if (state.mode === 'replay') prevPeriod();
                    break;
                case 'arrowright':
                    if (state.mode === 'replay') nextPeriod();
                    break;
            }
        }
    </script>
</body>
</html>
